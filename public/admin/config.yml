backend:
  name: github
  repo: MockLeki/game-wiki
  branch: main
  base_url: https://deskrawl.top
  auth_endpoint: /api/auth

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

publish_mode: editorial_workflow

collections:
  - name: "pages"
    label: "📄 Wiki 页面"
    folder: ""
    create: true
    extension: md
    fields:
      - { label: "页面标题", name: "title", widget: "string" }
      - { label: "正文", name: "body", widget: "markdown" }

  - name: "game_data"
    label: "🎮 游戏数据 (JSON)"
    files:
      - label: "装备数据库"
        name: "items"
        file: "public/data/items.json"
        fields:
          - { label: "装备数据", name: "body", widget: "code", default_language: "json" }

      - label: "天赋数据库"
        name: "talents"
        file: "public/data/talents.json"
        fields:
          - { label: "天赋数据 (战士/法师)", name: "body", widget: "code", default_language: "json" }

      - label: "技能数据库"
        name: "skills"
        file: "public/data/skills.json"
        fields:
          - { label: "技能数据", name: "body", widget: "code", default_language: "json" }

      - label: "世界地图数据"
        name: "world"
        file: "public/data/levels.json"
        fields:
          - { label: "关卡数据", name: "body", widget: "code", default_language: "json" }

      - label: "仆从数据库"
        name: "minions"
        file: "public/data/minions.json"
        fields:
          - { label: "仆从数据", name: "body", widget: "code", default_language: "json" }

      - label: "词条数据"
        name: "affixes"
        file: "public/data/affixes.json"
        fields:
          - { label: "词条数据", name: "body", widget: "code", default_language: "json" }
