<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiki 内容管理 - 需 Steam 验证</title>
<script src="https://unpkg.com/decap-cms@3.6.1/dist/decap-cms.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0806; color: #c0b8a8; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
  .login-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; text-align: center; padding: 2rem;
  }
  .login-screen h1 { color: #c9a96a; margin-bottom: 0.6rem; font-size: 1.5rem; letter-spacing: 0.05em; }
  .login-screen p { color: #706858; margin-bottom: 1.5rem; font-size: 0.9rem; max-width: 480px; }
  .login-btn {
    display: inline-block; background: #12100e; border: 1px solid #6b5230; color: #c9a96a;
    padding: 0.7rem 1.6rem; cursor: pointer; font-size: 0.95rem; text-decoration: none;
    letter-spacing: 0.05em; transition: all 0.2s; margin: 0.3rem;
  }
  .login-btn:hover { background: #1a1612; border-color: #998055; color: #f0d78c; }
  .login-btn.github { border-color: #4a2020; color: #c9b8a0; }
  .login-btn.github:hover { background: #1e1814; border-color: #c9a96a; }
  .note {
    margin-top: 1.5rem; padding: 1rem; background: rgba(0,0,0,0.3);
    border-left: 3px solid #6b5230; max-width: 500px; font-size: 0.82rem;
  }
  .note strong { color: #c9a96a; }
  .error {
    background: rgba(74, 32, 32, 0.3); border: 1px solid #4a2020; border-left: 3px solid #4a2020;
    color: #b83030; padding: 1rem; max-width: 500px; font-size: 0.9rem;
  }
  .user-info {
    background: #12100e; border: 1px solid #6b5230; padding: 0.6rem 1rem;
    margin-bottom: 1rem; display: flex; align-items: center; gap: 0.6rem; max-width: 500px;
  }
  .user-info img { width: 32px; height: 32px; border-radius: 2px; }
  .user-info .name { color: #c9a96a; font-weight: 600; }
</style>
</head>
<body>
<div id="app" class="login-screen" style="display:flex">
  <h1>桌面破坏神 Wiki · 管理后台</h1>
  <p>第一步：Steam 验证身份<br>第二步：GitHub 登录编辑数据</p>
  <div id="auth-step"></div>
  <div class="note">
    <strong>使用方法</strong><br>
    1. 用 噜总 的 Steam 号登录 → 验证通过<br>
    2. 点 GitHub 登录 → 跳转 GitHub 授权<br>
    3. 进入后台 → 左侧有 7 个 JSON 数据集<br>
    4. 编辑完 → 点 Publish → 1-2 分钟自动上线
  </div>
</div>
<script>
  // 检查 Steam 登录状态
  async function checkSteam() {
    const res = await fetch('https://deskrawl.top/api/auth/status', { credentials: 'include' })
    const auth = await res.json()
    const res2 = await fetch('https://deskrawl.top/api/admin/check', { credentials: 'include' })
    const admin = await res2.json()
    return { auth, admin }
  }

  function render() {
    checkSteam().then(({ auth, admin }) => {
      const el = document.getElementById('auth-step')
      if (!auth.loggedIn) {
        el.innerHTML = `
          <a href="https://deskrawl.top/api/auth/steam" class="login-btn">🎮 第一步: Steam 登录</a>
          <div class="note">需先 Steam 登录才能进入后台</div>
        `
      } else if (!admin.admin) {
        el.innerHTML = `
          <div class="user-info">
            <img src="${auth.avatar}" />
            <div>
              <div class="name">${auth.name}</div>
              <div style="color: #706858; font-size: 0.78rem">Steam ID: ${auth.steamId}</div>
            </div>
          </div>
          <div class="error">
            ❌ 你不是管理员（Steam ID: ${auth.steamId}）<br>
            噜总已登录但不在管理员名单。请联系噜总把你加进 ADMIN_STEAM_IDS。
          </div>
          <a href="https://deskrawl.top/api/auth/steam" class="login-btn" style="margin-top: 0.6rem">🔄 切换其他 Steam 账号</a>
        `
      } else {
        el.innerHTML = `
          <div class="user-info">
            <img src="${auth.avatar}" />
            <div>
              <div class="name">✅ ${auth.name} (管理员)</div>
              <div style="color: #c9a96a; font-size: 0.78rem">Steam ID: ${auth.steamId}</div>
            </div>
          </div>
          <a href="/api/oauth" class="login-btn github">📝 第二步: GitHub 登录 (进入后台)</a>
          <a href="https://deskrawl.top" class="login-btn" style="margin-top: 0.6rem; display: block; max-width: 300px; margin-left: auto; margin-right: auto">← 返回 Wiki</a>
        `
        // 隐藏 Decap CMS 默认 UI
        setTimeout(() => { document.getElementById('app').style.display = 'none' }, 100)
      }
    })
  }
  render()
</script>
</body>
</html>
