<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiki 内容管理</title>
<link href="https://cdn.jsdelivr.net/npm/netlify-cms@2.10/dist/netlify-cms.js" rel="preload" as="script">
<script src="https://cdn.jsdelivr.net/npm/netlify-cms@2.10/dist/netlify-cms.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1614; color: #efe6d8; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
  .login-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; text-align: center;
  }
  .login-screen h1 { color: #c9a55b; margin-bottom: 1rem; font-size: 1.5rem; }
  .login-screen p { color: #8f7f6e; margin-bottom: 2rem; font-size: 0.9rem; }
  .login-btn {
    display: inline-block; background: #2d2723; border: 2px solid #c9a55b; color: #c9a55b;
    padding: 0.8rem 2rem; border-radius: 6px; cursor: pointer; font-size: 1rem; text-decoration: none;
  }
  .login-btn:hover { background: rgba(201, 165, 91, 0.15); }
  .note {
    margin-top: 2rem; padding: 1rem; background: rgba(201, 165, 91, 0.05);
    border-left: 3px solid #c9a55b; border-radius: 4px; max-width: 500px; font-size: 0.85rem; color: #c7b8a3;
  }
  .note strong { color: #c9a55b; }
</style>
</head>
<body>
<div class="login-screen">
<h1>⚔️ 桌面破坏神 Wiki 管理后台</h1>
<p>在线编辑百科内容，保存后自动更新到网站</p>
<a href="/api/oauth" class="login-btn">🔑 用 GitHub 账号登录</a>
<div class="note">
<strong>说明：</strong> 仅仓库协作者可编辑。编辑后自动创建 Git commit 并推送，Cloudflare Pages 自动部署。<br>
<strong>编辑权限：</strong> 拥有 deskrawl wiki 仓库写权限的 GitHub 账号。<br>
<strong>快捷键：</strong> 登录后可直接在页面中编辑 Markdown 内容、图片、JSON 数据。
</div>
</div>
</body>
</html>
