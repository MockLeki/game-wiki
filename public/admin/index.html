<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiki 内容管理</title>
<script src="https://unpkg.com/decap-cms@3.6.1/dist/decap-cms.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #050202; color: #c9b8a0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
  .login-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; text-align: center;
  }
  .login-screen h1 { color: #c9a55b; margin-bottom: 1rem; font-size: 1.5rem; }
  .login-screen p { color: #6a5a48; margin-bottom: 2rem; font-size: 0.9rem; }
  .login-btn {
    display: inline-block; background: #0a0506; border: 2px solid #b81c1c; color: #ff3020;
    padding: 0.8rem 2rem; cursor: pointer; font-size: 1rem; text-decoration: none;
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  .login-btn:hover { background: rgba(184, 28, 28, 0.3); }
  .note {
    margin-top: 2rem; padding: 1rem; background: rgba(184, 28, 28, 0.1);
    border-left: 3px solid #b81c1c; max-width: 500px; font-size: 0.85rem;
  }
  .note strong { color: #c9a55b; }
</style>
</head>
<body>
<div id="app" class="login-screen" style="display:flex">
  <h1>桌面破坏神 Wiki 管理后台</h1>
  <p>在线编辑 Wiki 内容和游戏数据</p>
  <a href="/api/oauth" class="login-btn">GitHub 登录</a>
  <div class="note">
    <strong>使用方法</strong><br>
    1. 点击上方按钮登录 GitHub<br>
    2. 编辑装备 / 技能 / 词条 / 天赋数据<br>
    3. 保存后自动发布到 Wiki<br>
    <br><strong>提示</strong>: 修改完 JSON 后点 "Publish" → 1-2 分钟自动上线
  </div>
</div>
<script>
  // 隐藏 Decap CMS 默认 UI，显示我们的登录按钮
  var observer = new MutationObserver(function() {
    var el = document.querySelector('[class*="css-"]');
    if (el) {
      document.getElementById('app').style.display = 'none';
    }
  });
  observer.observe(document.body, { childList: true, subtree: true });
</script>
</body>
</html>
