<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>构筑模拟器 - 桌面破坏神</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(135deg,#030518 0%,#0a0a25 50%,#030518 100%);color:#d0d8f0;font-family:'Inter','Microsoft YaHei',sans-serif;min-height:100vh;padding:1rem}
*::-webkit-scrollbar{width:8px;height:8px}
*::-webkit-scrollbar-track{background:rgba(0,217,255,0.05)}
*::-webkit-scrollbar-thumb{background:rgba(0,217,255,0.3);border-radius:4px}

.topbar{display:flex;align-items:center;gap:1rem;background:linear-gradient(135deg,rgba(15,20,50,0.7) 0%,rgba(25,30,65,0.5) 100%);border:1px solid rgba(0,217,255,0.3);padding:0.8rem 1.2rem;margin-bottom:1rem;backdrop-filter:blur(8px)}
.topbar h1{font-size:1.3rem;color:#7fffe0;font-weight:700;text-shadow:0 0 8px #00d9ff;letter-spacing:0.05em}
.build-name{background:rgba(0,0,0,0.4);border:1px solid rgba(0,217,255,0.4);color:#fff;padding:0.4rem 0.8rem;font-size:0.9rem;width:200px}
.class-tabs{display:flex;gap:0.4rem;margin-left:auto}
.class-tab{padding:0.4rem 1rem;background:rgba(0,0,0,0.3);border:1px solid rgba(0,217,255,0.3);color:#a0a8c0;cursor:pointer;font-size:0.85rem}
.class-tab.active{background:linear-gradient(135deg,rgba(0,217,255,0.3) 0%,rgba(255,0,255,0.15) 100%);color:#7fffe0;border-color:#7fffe0;box-shadow:0 0 8px rgba(0,217,255,0.3)}
.action-btn{padding:0.4rem 0.8rem;background:rgba(0,217,255,0.15);border:1px solid rgba(0,217,255,0.4);color:#7fffe0;cursor:pointer;font-size:0.85rem}
.action-btn:hover{background:rgba(0,217,255,0.3);box-shadow:0 0 8px rgba(0,217,255,0.3)}
.action-btn.danger{background:rgba(184,48,48,0.15);border-color:rgba(184,48,48,0.5);color:#ff6ec7}
.action-btn.primary{background:linear-gradient(135deg,rgba(0,217,255,0.3) 0%,rgba(255,0,255,0.2) 100%)}

.main-grid{display:grid;grid-template-columns:280px 1fr 280px;gap:1rem;min-height:calc(100vh - 6rem)}
.panel{background:linear-gradient(135deg,rgba(15,20,50,0.7) 0%,rgba(25,30,65,0.5) 100%);border:1px solid rgba(0,217,255,0.3);padding:1rem;backdrop-filter:blur(8px)}
.panel-title{font-size:0.95rem;color:#7fffe0;font-weight:600;margin-bottom:0.8rem;padding-bottom:0.5rem;border-bottom:1px solid rgba(0,217,255,0.3);text-shadow:0 0 4px #00d9ff;letter-spacing:0.05em;display:flex;align-items:center;gap:0.4rem}

/* === 装备栏 === */
.equip-list{display:flex;flex-direction:column;gap:0.4rem}
.equip-slot{display:flex;align-items:center;gap:0.6rem;background:rgba(0,0,0,0.3);border:1px solid rgba(0,217,255,0.2);padding:0.4rem;cursor:pointer;transition:all 0.2s}
.equip-slot:hover{border-color:#7fffe0;box-shadow:0 0 6px rgba(0,217,255,0.3)}
.equip-slot.has-item{border-color:rgba(0,217,255,0.6);background:rgba(0,217,255,0.08)}
.equip-slot .slot-icon{width:36px;height:36px;background:rgba(0,0,0,0.4);border:1px solid rgba(0,217,255,0.3);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.equip-slot .slot-info{flex:1;min-width:0}
.equip-slot .slot-type{font-size:0.7rem;color:#6a7290;letter-spacing:0.05em}
.equip-slot .slot-name{font-size:0.85rem;color:#d0d8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.equip-slot .slot-name.q-common{color:#9e9e9e}
.equip-slot .slot-name.q-uncommon{color:#4caf50}
.equip-slot .slot-name.q-rare{color:#2196f3}
.equip-slot .slot-name.q-legendary{color:#ff9800}
.equip-slot .slot-affixes{font-size:0.7rem;color:#6a7290}
.equip-slot .slot-clear{opacity:0;background:rgba(184,48,48,0.3);border:1px solid #b83030;color:#fff;width:20px;height:20px;cursor:pointer;font-size:0.7rem;line-height:1}
.equip-slot:hover .slot-clear{opacity:1}

/* === 天赋树（精简）=== */
.talent-tabs{display:flex;gap:0.3rem;margin-bottom:0.6rem}
.talent-tab{flex:1;padding:0.3rem;background:rgba(0,0,0,0.3);border:1px solid rgba(0,217,255,0.2);color:#a0a8c0;cursor:pointer;font-size:0.75rem}
.talent-tab.active{background:linear-gradient(135deg,rgba(0,217,255,0.3) 0%,rgba(255,0,255,0.15) 100%);color:#7fffe0;border-color:#7fffe0}
.talent-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:0.3rem;margin-bottom:0.6rem}
.talent-node{position:relative;aspect-ratio:1;background:rgba(0,0,0,0.3);border:1px solid rgba(0,217,255,0.2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.7rem;text-align:center;padding:0.2rem;color:#a0a8c0;transition:all 0.2s;min-height:50px}
.talent-node:hover:not(.locked):not(.empty){border-color:#7fffe0;color:#fff;box-shadow:0 0 6px rgba(0,217,255,0.3)}
.talent-node.has-points{border-color:#00d9ff;color:#7fffe0;background:rgba(0,217,255,0.15);box-shadow:0 0 6px rgba(0,217,255,0.3)}
.talent-node.full{background:linear-gradient(135deg,rgba(0,217,255,0.3) 0%,rgba(255,215,0,0.15) 100%);color:#ffd700;border-color:#ffd700}
.talent-node.locked{opacity:0.3;cursor:not-allowed}
.talent-node.empty{background:rgba(0,0,0,0.2);border:1px dashed rgba(0,217,255,0.1);color:#555}
.talent-counter{position:absolute;top:2px;right:2px;background:rgba(0,217,255,0.8);color:#000;font-size:0.6rem;padding:0.05rem 0.2rem;font-weight:700}
.talent-points-info{background:rgba(0,0,0,0.3);padding:0.4rem 0.6rem;border:1px solid rgba(0,217,255,0.2);font-size:0.8rem;color:#a0a8c0;display:flex;justify-content:space-between}
.talent-points-info strong{color:#7fffe0;font-size:1rem}

/* === 技能 === */
.skill-bar{display:grid;grid-template-columns:repeat(6,1fr);gap:0.4rem;margin-bottom:0.8rem}
.skill-slot{aspect-ratio:1;background:rgba(0,0,0,0.3);border:1px solid rgba(0,217,255,0.2);display:flex;align-items:center;justify-content:center;font-size:1.2rem;cursor:pointer}
.skill-slot:hover{border-color:#7fffe0}
.skill-slot.active{border-color:#ffd700;box-shadow:0 0 8px rgba(255,215,0,0.4)}

/* === 属性面板 === */
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:0.3rem 0;border-bottom:1px dashed rgba(0,217,255,0.1);font-size:0.8rem}
.stat-row:last-child{border-bottom:none}
.stat-label{color:#6a7290}
.stat-value{color:#7fffe0;font-weight:600}
.stat-value.positive{color:#4caf50}
.stat-value.negative{color:#ff6ec7}
.dmg-preview{background:linear-gradient(135deg,rgba(255,0,255,0.15) 0%,rgba(185,74,255,0.1) 100%);border:1px solid rgba(255,0,255,0.4);padding:0.6rem;margin:0.5rem 0;text-align:center}
.dmg-num{font-size:1.6rem;color:#ffd700;font-weight:700;text-shadow:0 0 8px #ffd700;font-family:monospace}

/* === 装备选择器模态 === */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.modal-content{background:#0a0a25;border:1px solid #00d9ff;width:90%;max-width:700px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 0 30px rgba(0,217,255,0.3)}
.modal-header{padding:0.8rem 1rem;border-bottom:1px solid rgba(0,217,255,0.3);display:flex;justify-content:space-between;align-items:center}
.modal-header h3{color:#7fffe0;font-size:1.1rem}
.modal-close{background:none;border:1px solid rgba(0,217,255,0.3);color:#7fffe0;width:28px;height:28px;cursor:pointer;font-size:1rem}
.modal-body{flex:1;overflow-y:auto;padding:1rem}
.modal-item{display:flex;align-items:center;gap:0.8rem;padding:0.5rem;border:1px solid rgba(0,217,255,0.2);margin-bottom:0.4rem;cursor:pointer;transition:all 0.2s}
.modal-item:hover{border-color:#7fffe0;background:rgba(0,217,255,0.1)}
.modal-item .mi-icon{width:40px;height:40px;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;font-size:1.3rem}
.modal-item .mi-info{flex:1}
.modal-item .mi-name{font-size:0.95rem;font-weight:600}
.modal-item .mi-name.q-common{color:#9e9e9e}
.modal-item .mi-name.q-uncommon{color:#4caf50}
.modal-item .mi-name.q-rare{color:#2196f3}
.modal-item .mi-name.q-legendary{color:#ff9800}
.modal-item .mi-affix{font-size:0.75rem;color:#6a7290}
.modal-search{width:100%;background:rgba(0,0,0,0.4);border:1px solid rgba(0,217,255,0.3);color:#fff;padding:0.5rem;margin-bottom:0.5rem;font-size:0.9rem}

/* 移动端 */
@media (max-width: 1024px){
  .main-grid{grid-template-columns:1fr;gap:0.6rem}
  .topbar{flex-wrap:wrap}
  .build-name{width:100%}
}
</style>
</head>
<body>

<div class="topbar">
  <h1>⚔ 构筑模拟器</h1>
  <input id="buildName" class="build-name" placeholder="构筑名称..." value="我的构筑" />
  <div class="class-tabs">
    <button class="class-tab active" data-class="Warrior">⚔ 战士</button>
    <button class="class-tab" data-class="Sorcerer">✨ 法师</button>
  </div>
  <button class="action-btn primary" id="shareBtn">🔗 分享</button>
  <button class="action-btn danger" id="resetBtn">↻ 重置</button>
</div>

<div class="main-grid">
  <!-- 左侧: 装备栏 -->
  <div class="panel">
    <div class="panel-title">🛡 装备 (10)</div>
    <div class="equip-list" id="equipList"></div>
  </div>

  <!-- 中间: 技能 + 天赋 -->
  <div class="panel" style="display:flex;flex-direction:column">
    <div class="panel-title">⚡ 技能 (6) <span style="margin-left:auto;font-size:0.75rem;color:#6a7290;font-weight:400">点击格子选技能</span></div>
    <div class="skill-bar" id="skillBar"></div>

    <div class="panel-title" style="margin-top:0.5rem">🌟 天赋树</div>
    <div class="talent-tabs">
      <button class="talent-tab active" data-class="Warrior">战士</button>
    </div>
    <div class="talent-points-info">
      <span>已分配 / 满级</span>
      <span><strong id="talentUsed">0</strong> / 32</span>
    </div>
    <div style="overflow-y:auto;flex:1;margin-top:0.5rem">
      <div class="talent-grid" id="talentGrid"></div>
    </div>
  </div>

  <!-- 右侧: 属性汇总 -->
  <div class="panel">
    <div class="panel-title">📊 属性总览</div>
    <div class="stat-row"><span class="stat-label">生命值</span><span class="stat-value" id="stat-hp">0</span></div>
    <div class="stat-row"><span class="stat-label">力量</span><span class="stat-value" id="stat-str">0</span></div>
    <div class="stat-row"><span class="stat-label">智力</span><span class="stat-value" id="stat-int">0</span></div>
    <div class="stat-row"><span class="stat-label">护甲</span><span class="stat-value" id="stat-armor">0</span></div>
    <div class="stat-row"><span class="stat-label">魔法抗性</span><span class="stat-value" id="stat-mres">0</span></div>
    <div class="stat-row"><span class="stat-label">暴击率</span><span class="stat-value" id="stat-crit">0%</span></div>
    <div class="stat-row"><span class="stat-label">暴击伤害</span><span class="stat-value" id="stat-critdmg">0%</span></div>
    <div class="stat-row"><span class="stat-label">攻击速度</span><span class="stat-value" id="stat-aspd">0%</span></div>
    <div class="stat-row"><span class="stat-label">生命恢复</span><span class="stat-value" id="stat-hpregen">0/s</span></div>
    <div class="stat-row"><span class="stat-label">荆棘</span><span class="stat-value" id="stat-thorn">0</span></div>

    <div class="dmg-preview">
      <div style="font-size:0.75rem;color:#a0a8c0">预估 DPS</div>
      <div class="dmg-num" id="dpsNum">--</div>
    </div>
  </div>
</div>

<div id="modal"></div>

<script>
'use strict';

// ============================================
// 装备数据 - 从 items.json 加载
// ============================================
const SLOTS = [
  { key: 'helm', name: '头盔', icon: '🪖' },
  { key: 'chest', name: '胸甲', icon: '🛡' },
  { key: 'shoulder', name: '护肩', icon: '🦾' },
  { key: 'pants', name: '护腿', icon: '👖' },
  { key: 'gloves', name: '手套', icon: '🧤' },
  { key: 'boots', name: '靴子', icon: '👢' },
  { key: 'belt', name: '腰带', icon: '🪢' },
  { key: 'amulet', name: '项链', icon: '📿' },
  { key: 'ring1', name: '戒指 1', icon: '💍' },
  { key: 'ring2', name: '戒指 2', icon: '💍' },
  { key: 'weapon', name: '武器', icon: '⚔' },
  { key: 'offhand', name: '副手', icon: '🛡' },
]

// 模拟装备库（避免加载大文件，先用模拟数据）
const ITEM_POOL = {
  helm: [
    { id: 'helm1', name: '战士头盔', quality: 'rare', stats: [{k:'armor',v:30},{k:'hp',v:50}] },
    { id: 'helm2', name: '光辉战盔', quality: 'legendary', stats: [{k:'armor',v:80},{k:'str',v:10}] },
  ],
  chest: [
    { id: 'chest1', name: '链甲胸甲', quality: 'rare', stats: [{k:'armor',v:50},{k:'hp',v:100}] },
    { id: 'chest2', name: '古王胸甲', quality: 'legendary', stats: [{k:'armor',v:120},{k:'hp',v:200}] },
  ],
  shoulder: [
    { id: 'shoulder1', name: '护肩', quality: 'uncommon', stats: [{k:'armor',v:20}] },
    { id: 'shoulder2', name: '巨战护肩', quality: 'legendary', stats: [{k:'armor',v:60},{k:'str',v:8}] },
  ],
  pants: [
    { id: 'pants1', name: '护腿', quality: 'rare', stats: [{k:'armor',v:40},{k:'hp',v:80}] },
    { id: 'pants2', name: '战王护腿', quality: 'legendary', stats: [{k:'armor',v:100},{k:'hp',v:150}] },
  ],
  gloves: [
    { id: 'gloves1', name: '皮手套', quality: 'uncommon', stats: [{k:'armor',v:15}] },
    { id: 'gloves2', name: '巨人手套', quality: 'legendary', stats: [{k:'armor',v:40},{k:'str',v:6}] },
  ],
  boots: [
    { id: 'boots1', name: '战靴', quality: 'rare', stats: [{k:'armor',v:25}] },
    { id: 'boots2', name: '疾风战靴', quality: 'legendary', stats: [{k:'armor',v:50},{k:'aspd',v:5}] },
  ],
  belt: [
    { id: 'belt1', name: '战腰', quality: 'uncommon', stats: [{k:'armor',v:15}] },
    { id: 'belt2', name: '吸血腰', quality: 'legendary', stats: [{k:'hp',v:200},{k:'lifesteal',v:5}] },
  ],
  amulet: [
    { id: 'amulet1', name: '力量护符', quality: 'rare', stats: [{k:'str',v:5}] },
    { id: 'amulet2', name: '暴君之眼', quality: 'legendary', stats: [{k:'str',v:15},{k:'crit',v:3}] },
  ],
  ring1: [
    { id: 'ring1a', name: '钢戒', quality: 'uncommon', stats: [{k:'armor',v:10}] },
    { id: 'ring1b', name: '血之戒', quality: 'legendary', stats: [{k:'hp',v:100},{k:'str',v:8}] },
  ],
  ring2: [
    { id: 'ring2a', name: '钢戒', quality: 'uncommon', stats: [{k:'armor',v:10}] },
    { id: 'ring2b', name: '无尽怒火戒', quality: 'legendary', stats: [{k:'str',v:12},{k:'critdmg',v:10}] },
  ],
  weapon: [
    { id: 'wpn1', name: '长剑', quality: 'rare', stats: [{k:'dmg',v:50}] },
    { id: 'wpn2', name: '北方巨人巨斧', quality: 'legendary', stats: [{k:'dmg',v:150},{k:'str',v:10}] },
  ],
  offhand: [
    { id: 'off1', name: '塔盾', quality: 'rare', stats: [{k:'armor',v:40}] },
    { id: 'off2', name: '古王壁垒', quality: 'legendary', stats: [{k:'armor',v:100},{k:'block',v:15}] },
  ],
}

// ============================================
// 天赋数据 (简化版)
// ============================================
const TALENT_TREE = {
  Warrior: [
    // 第0层
    { tier: 0, col: 0, name: '力量', max: 5, perPoint: 5, stat: 'str' },
    { tier: 0, col: 1, name: '活力', max: 5, perPoint: 50, stat: 'hp' },
    { tier: 0, col: 2, name: '护甲', max: 5, perPoint: 25, stat: 'armor' },
    { tier: 0, col: 3, name: '荆棘', max: 5, perPoint: 3, stat: 'thorn' },
    { tier: 0, col: 4, name: '攻击速度', max: 5, perPoint: 2, stat: 'aspd' },
    // 第1层
    { tier: 1, col: 0, name: '暴击几率', max: 3, perPoint: 2, stat: 'crit' },
    { tier: 1, col: 1, name: '生命恢复', max: 5, perPoint: 4, stat: 'hpregen' },
    { tier: 1, col: 2, name: '暴击伤害', max: 5, perPoint: 3, stat: 'critdmg' },
    { tier: 1, col: 3, name: '凶猛', max: 5, perPoint: 5, stat: 'dmgBonus' },
    { tier: 1, col: 4, name: '战斗激励', max: 3, perPoint: 10, stat: 'proc' },
    // 第2层
    { tier: 2, col: 0, name: '专注', max: 5, perPoint: 1, stat: 'stun' },
    { tier: 2, col: 1, name: '重击', max: 5, perPoint: 5, stat: 'vuln' },
    { tier: 2, col: 2, name: '劈砍狂怒', max: 1, perPoint: 2, stat: 'aspd' },
    { tier: 2, col: 3, name: '强化强力攻击', max: 5, perPoint: 5, stat: 'manaSave' },
    { tier: 2, col: 4, name: '荆棘强化', max: 5, perPoint: 10, stat: 'thorn' },
  ]
}

// ============================================
// 技能栏
// ============================================
const SKILL_SLOTS = [
  { key: 'basic', name: '普通攻击', icon: '⚔' },
  { key: 'core', name: '核心技能', icon: '💥' },
  { key: 'def1', name: '防御 1', icon: '🛡' },
  { key: 'def2', name: '防御 2', icon: '🛡' },
  { key: 'bark1', name: '战吼 1', icon: '📯' },
  { key: 'bark2', name: '战吼 2', icon: '📯' },
]

// ============================================
// 状态
// ============================================
let state = {
  buildName: '我的构筑',
  activeClass: 'Warrior',
  equips: {},  // { slotKey: item }
  talents: {},  // { 'tier-col': points }
  skills: {},  // { slotKey: skillName }
}

// 从 URL 加载
function loadFromUrl() {
  const hash = location.hash.slice(1)
  if (!hash) return
  try {
    const decoded = JSON.parse(atob(decodeURIComponent(hash)))
    if (decoded.name) state.buildName = decoded.name
    if (decoded.class) state.activeClass = decoded.class
    if (decoded.equips) state.equips = decoded.equips
    if (decoded.talents) state.talents = decoded.talents
  } catch (e) { console.warn('Load URL error', e) }
}

function saveToUrl() {
  const data = {
    name: state.buildName,
    class: state.activeClass,
    equips: state.equips,
    talents: state.talents,
  }
  const encoded = btoa(JSON.stringify(data))
  history.replaceState(null, '', '#' + encodeURIComponent(encoded))
}

// ============================================
// 渲染
// ============================================
function renderEquipList() {
  const html = SLOTS.map(s => {
    const item = state.equips[s.key]
    const qClass = item ? `q-${item.quality}` : ''
    const nameHtml = item
      ? `<span class="slot-name ${qClass}">${item.name}</span><div class="slot-affixes">${item.stats.map(st=>`+${st.v} ${statName(st.k)}`).join(' · ')}</div>`
      : `<span class="slot-name" style="color:#6a7290">${s.name}</span><div class="slot-affixes" style="color:#4a5070">点击装备</div>`
    return `<div class="equip-slot ${item?'has-item':''}" data-slot="${s.key}">
      <div class="slot-icon">${s.icon}</div>
      <div class="slot-info">
        <div class="slot-type">${s.name.toUpperCase()}</div>
        ${nameHtml}
      </div>
      ${item ? `<button class="slot-clear" data-clear="${s.key}">×</button>` : ''}
    </div>`
  }).join('')
  document.getElementById('equipList').innerHTML = html
}

function renderSkillBar() {
  const html = SKILL_SLOTS.map(s => {
    const skill = state.skills[s.key]
    return `<div class="skill-slot ${skill?'active':''}" data-skill="${s.key}">${skill?.icon || s.icon}</div>`
  }).join('')
  document.getElementById('skillBar').innerHTML = html
}

function renderTalentGrid() {
  const tree = TALENT_TREE[state.activeClass] || []
  const html = tree.map(t => {
    const points = state.talents[`${t.tier}-${t.col}`] || 0
    const cls = points === 0 ? '' : (points >= t.max ? 'full' : 'has-points')
    return `<div class="talent-node ${cls}" data-tier="${t.tier}" data-col="${t.col}">
      ${t.name}
      ${points > 0 ? `<div class="talent-counter">${points}/${t.max}</div>` : ''}
    </div>`
  }).join('')
  document.getElementById('talentGrid').innerHTML = html
}

function renderStats() {
  // 从装备 + 天赋计算
  let stats = { hp: 100, str: 0, int: 0, armor: 0, mres: 0, crit: 5, critdmg: 50, aspd: 0, hpregen: 0, thorn: 0, dmg: 10, dmgBonus: 0, stun: 0, vuln: 0, manaSave: 0 }
  
  // 装备属性
  for (const key in state.equips) {
    const item = state.equips[key]
    item.stats.forEach(s => {
      stats[s.k] = (stats[s.k] || 0) + s.v
    })
  }
  
  // 天赋
  for (const key in state.talents) {
    const [tier, col] = key.split('-').map(Number)
    const t = (TALENT_TREE[state.activeClass]||[]).find(x => x.tier===tier && x.col===col)
    if (t) stats[t.stat] = (stats[t.stat]||0) + state.talents[key] * t.perPoint
  }
  
  document.getElementById('stat-hp').textContent = Math.round(stats.hp)
  document.getElementById('stat-str').textContent = Math.round(stats.str)
  document.getElementById('stat-int').textContent = Math.round(stats.int)
  document.getElementById('stat-armor').textContent = Math.round(stats.armor)
  document.getElementById('stat-mres').textContent = Math.round(stats.mres)
  document.getElementById('stat-crit').textContent = stats.crit.toFixed(1) + '%'
  document.getElementById('stat-critdmg').textContent = stats.critdmg.toFixed(0) + '%'
  document.getElementById('stat-aspd').textContent = stats.aspd.toFixed(1) + '%'
  document.getElementById('stat-hpregen').textContent = stats.hpregen.toFixed(1) + '/s'
  document.getElementById('stat-thorn').textContent = Math.round(stats.thorn)
  
  // DPS 预估
  const baseDmg = stats.dmg * (1 + stats.str * 0.01)
  const critMult = 1 + (stats.crit/100) * (stats.critdmg/100)
  const aspdMult = 1 + stats.aspd / 100
  const bonusMult = 1 + (stats.dmgBonus||0) / 100
  const dps = baseDmg * critMult * aspdMult * bonusMult
  document.getElementById('dpsNum').textContent = Math.round(dps).toLocaleString()
  
  // 更新天赋已分配
  const used = Object.values(state.talents).reduce((a,b)=>a+b, 0)
  document.getElementById('talentUsed').textContent = used
}

function statName(k) {
  const map = { hp: 'HP', str: '力量', int: '智力', armor: '护甲', mres: '魔抗', crit: '暴击率', critdmg: '暴击伤害', aspd: '攻速', hpregen: 'HP/s', thorn: '荆棘', dmg: '伤害', lifesteal: '吸血%', block: '格挡%', stun: '眩晕%', vuln: '易伤%', manaSave: '蓝耗%', dmgBonus: '增伤%', proc: '触发%' }
  return map[k] || k
}

function renderAll() {
  document.getElementById('buildName').value = state.buildName
  document.querySelectorAll('.class-tab').forEach(t => t.classList.toggle('active', t.dataset.class === state.activeClass))
  renderEquipList()
  renderSkillBar()
  renderTalentGrid()
  renderStats()
}

// ============================================
// 交互
// ============================================
function openItemPicker(slotKey) {
  const slot = SLOTS.find(s => s.key === slotKey)
  const items = ITEM_POOL[slotKey] || []
  const html = `<div class="modal" id="modalInner">
    <div class="modal-content">
      <div class="modal-header">
        <h3>选择 ${slot.name}</h3>
        <button class="modal-close" id="closeModal">×</button>
      </div>
      <div class="modal-body">
        <input class="modal-search" placeholder="搜索装备..." id="searchInput" />
        <div id="itemList">
          ${items.map(item => renderModalItem(item)).join('')}
        </div>
      </div>
    </div>
  </div>`
  document.getElementById('modal').innerHTML = html
  
  document.getElementById('closeModal').onclick = () => document.getElementById('modal').innerHTML = ''
  document.getElementById('searchInput').oninput = (e) => {
    const q = e.target.value.toLowerCase()
    document.getElementById('itemList').innerHTML = items
      .filter(it => it.name.toLowerCase().includes(q))
      .map(item => renderModalItem(item)).join('')
  }
}

function renderModalItem(item) {
  return `<div class="modal-item" data-id="${item.id}">
    <div class="mi-icon">⚔</div>
    <div class="mi-info">
      <div class="mi-name q-${item.quality}">${item.name}</div>
      <div class="mi-affix">${item.stats.map(s=>`+${s.v} ${statName(s.k)}`).join(' · ')}</div>
    </div>
  </div>`
}

// 事件委托
document.body.addEventListener('click', (e) => {
  // 关闭模态
  if (e.target.id === 'modal') document.getElementById('modal').innerHTML = ''
  
  // 装备槽点击
  const slot = e.target.closest('.equip-slot')
  if (slot && !e.target.closest('.slot-clear')) {
    openItemPicker(slot.dataset.slot)
    return
  }
  
  // 装备清除
  if (e.target.classList.contains('slot-clear')) {
    delete state.equips[e.target.dataset.clear]
    saveToUrl(); renderAll()
    return
  }
  
  // 模态内选择装备
  const mi = e.target.closest('.modal-item')
  if (mi) {
    // 找到 slotKey - 通过 modal 上下文
    // 简化：直接用当前 modal 的 slotKey
    const all = ITEM_POOL
    let picked = null
    for (const k in all) {
      picked = all[k].find(it => it.id === mi.dataset.id)
      if (picked) break
    }
    if (picked) {
      // 找到是哪个 slot
      let slotKey = null
      for (const k in all) {
        if (all[k].find(it => it.id === mi.dataset.id)) { slotKey = k; break }
      }
      if (slotKey) {
        state.equips[slotKey] = picked
        saveToUrl(); renderAll()
        document.getElementById('modal').innerHTML = ''
      }
    }
    return
  }
  
  // 技能栏点击
  const ss = e.target.closest('.skill-slot')
  if (ss) {
    const skills = ['普通攻击', '顺劈', '猛击', '盾牌猛击', '战吼', '狂战之吼']
    const idx = SKILL_SLOTS.findIndex(s => s.key === ss.dataset.skill)
    state.skills[ss.dataset.skill] = { name: skills[idx] || '技能', icon: ss.textContent.trim() }
    renderAll()
    return
  }
  
  // 天赋点击
  const tn = e.target.closest('.talent-node')
  if (tn) {
    const tier = parseInt(tn.dataset.tier)
    const col = parseInt(tn.dataset.col)
    const key = `${tier}-${col}`
    const used = Object.values(state.talents).reduce((a,b)=>a+b, 0)
    const t = (TALENT_TREE[state.activeClass]||[]).find(x => x.tier===tier && x.col===col)
    if (!t) return
    const cur = state.talents[key] || 0
    if (cur > 0) {
      // 减少
      state.talents[key] = cur - 1
      if (state.talents[key] === 0) delete state.talents[key]
    } else if (used < 32) {
      state.talents[key] = 1
    } else {
      alert('已分配 32 点上限')
    }
    saveToUrl(); renderAll()
    return
  }
  
  // 职业切换
  const ct = e.target.closest('.class-tab')
  if (ct) {
    state.activeClass = ct.dataset.class
    saveToUrl(); renderAll()
  }
})

// 构筑名输入
document.getElementById('buildName').addEventListener('input', (e) => {
  state.buildName = e.target.value
  saveToUrl()
})

// 分享 / 重置
document.getElementById('shareBtn').onclick = () => {
  const url = location.href
  navigator.clipboard?.writeText(url).then(() => {
    alert('✅ 构筑链接已复制到剪贴板\n' + url)
  }) || prompt('复制此链接分享:', url)
}
document.getElementById('resetBtn').onclick = () => {
  if (confirm('确定要清空当前构筑吗？')) {
    state.equips = {}; state.talents = {}; state.skills = {}
    saveToUrl(); renderAll()
  }
}

// 启动
loadFromUrl()
renderAll()
</script>
</body>
</html>
